<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bibi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #ffffff;
      --surface:      #f5f4f0;
      --surface2:     #eeede8;
      --border:       #e6e4df;
      --text:         #1a1815;
      --dim:          #9b9490;
      --purple:       #7c3aed;
      --purple2:      #8b5cf6;
      --green:        #059669;
      --yellow:       #d97706;
      --red:          #dc2626;
      --bubble-user:  #f3f0ff;
      --bubble-uborder: #c4b5fd;
      --send:         #7c3aed;
    }

    body.dark {
      --bg:           #0a0812;
      --surface:      #120f22;
      --surface2:     #1c1835;
      --border:       #2a2448;
      --text:         #f0ebff;
      --dim:          #7c6fa0;
      --purple:       #8b5cf6;
      --purple2:      #a78bfa;
      --green:        #34d399;
      --yellow:       #fbbf24;
      --red:          #f87171;
      --bubble-user:  rgba(139,92,246,.15);
      --bubble-uborder: rgba(139,92,246,.4);
      --send:         #8b5cf6;
    }

    body {
      width: 420px;
      height: 580px;
      background: var(--bg);
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s, color .2s;
    }

    /* ── Header */
    .header {
      background: var(--bg);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .logo-wrap {
      width: 28px; height: 28px; border-radius: 7px;
      overflow: hidden; display: flex;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .logo-wrap .logo-fallback { font-size: 14px; display: none; }
    .header-name {
      font-size: 16px; font-weight: 700;
      letter-spacing: -.02em; color: var(--text);
    }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .btn-icon {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent; color: var(--dim);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* ── Group bar */
    .group-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background .2s;
    }
    .group-tabs {
      display: flex; align-items: center; gap: 4px;
      flex: 1; overflow: hidden;
    }
    .group-label { font-size: 10px; color: var(--dim); flex-shrink: 0; margin-right: 2px; }
    .tab-pill {
      background: rgba(124,58,237,.1);
      border: 1px solid rgba(124,58,237,.22);
      color: var(--purple);
      padding: 2px 7px; border-radius: 9px;
      font-size: 9px; font-weight: 600;
      white-space: nowrap; max-width: 85px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .btn-group {
      font-size: 10px; font-weight: 600;
      color: var(--purple); background: none;
      cursor: pointer; padding: 3px 9px; border-radius: 6px;
      border: 1px solid rgba(124,58,237,.28);
      font-family: inherit; transition: all .15s;
      flex-shrink: 0; margin-left: 6px;
    }
    .btn-group:hover { background: rgba(124,58,237,.08); }

    /* ── Chat area */
    .chat {
      flex: 1; overflow-y: auto;
      padding: 16px 14px 6px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg);
      transition: background .2s;
    }

    /* ── Message bubbles */
    .msg { display: flex; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px; overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: contain; }
    .msg.user .msg-avatar { font-size: 11px; }

    .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px 13px;
      font-size: 13px;
      line-height: 1.55;
      max-width: calc(100% - 40px);
      color: var(--text);
      white-space: pre-wrap;
      transition: background .2s, border-color .2s;
    }
    .msg.user .msg-bubble {
      background: var(--bubble-user);
      border-color: var(--bubble-uborder);
    }
    .msg-bubble.thinking {
      color: var(--dim);
      display: flex; align-items: center; gap: 9px;
    }
    .dots span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--purple2); border-radius: 50%;
      animation: dot-bounce .9s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dot-bounce {
      0%,80%,100% { transform: translateY(0); opacity: .35; }
      40%          { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Plan card */
    .plan-card {
      border: 1px solid rgba(124,58,237,.28);
      border-radius: 13px; padding: 12px;
      background: var(--surface);
      max-width: calc(100% - 40px);
    }
    .plan-title {
      font-size: 12px; font-weight: 600; color: var(--purple);
      margin-bottom: 10px;
    }
    .plan-steps { display: flex; flex-direction: column; gap: 4px; margin-bottom: 11px; }
    .plan-step {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 12px; color: var(--dim);
      padding: 6px 9px; border-radius: 7px;
      background: var(--bg);
      border-left: 2px solid var(--border);
      transition: border-color .2s, color .2s;
    }
    .plan-step .step-num {
      width: 16px; height: 16px; border-radius: 4px;
      background: rgba(124,58,237,.1); color: var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
      transition: all .2s;
    }
    .plan-step.running { border-left-color: var(--yellow); color: var(--text); }
    .plan-step.running .step-num { background: rgba(217,119,6,.1); color: var(--yellow); animation: blink .65s infinite; }
    .plan-step.done  { border-left-color: var(--green); }
    .plan-step.done  .step-num { background: rgba(5,150,105,.1); color: var(--green); }
    .plan-step.error { border-left-color: var(--red); }
    .plan-step.error .step-num { background: rgba(220,38,38,.1); color: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .plan-actions { display: flex; gap: 7px; }
    .btn-confirm {
      flex: 1; padding: 8px 12px; border-radius: 9px; border: none;
      background: var(--send); color: white;
      font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all .15s;
    }
    .btn-confirm:hover { opacity: .88; transform: translateY(-1px); }
    .btn-deny {
      padding: 8px 12px; border-radius: 9px;
      background: transparent; color: var(--red);
      border: 1px solid rgba(220,38,38,.28);
      font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all .15s;
    }
    .btn-deny:hover { background: rgba(220,38,38,.07); }

    /* ── Inline status */
    .msg-inline {
      font-size: 10px; color: var(--dim);
      padding: 3px 11px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      align-self: center;
    }
    .msg-inline.ok   { color: var(--green);  border-color: rgba(5,150,105,.3);   background: rgba(5,150,105,.07); }
    .msg-inline.err  { color: var(--red);    border-color: rgba(220,38,38,.3);   background: rgba(220,38,38,.07); }
    .msg-inline.warn { color: var(--yellow); border-color: rgba(217,119,6,.3);   background: rgba(217,119,6,.07); }
    .msg-inline.info { color: var(--purple); border-color: rgba(124,58,237,.3);  background: rgba(124,58,237,.07); }

    /* ── Input (Claude-style) */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 12px 14px 14px;
      background: var(--bg);
      flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .input-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px 8px;
      transition: border-color .18s, box-shadow .18s, background .2s;
    }
    .input-box:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.1);
    }
    .chat-input {
      width: 100%; background: transparent; border: none; outline: none;
      font-size: 13px; font-family: inherit; color: var(--text);
      resize: none; min-height: 22px; max-height: 100px;
      line-height: 1.45; overflow-y: auto;
    }
    .chat-input::placeholder { color: var(--dim); }
    .input-toolbar {
      display: flex; align-items: center; justify-content: flex-end;
      margin-top: 8px;
    }
    .btn-send {
      width: 32px; height: 32px; border-radius: 9px; border: none;
      background: var(--send); color: white;
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-send:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn-send:disabled { opacity: .28; cursor: not-allowed; transform: none; }

    /* ── Settings */
    .settings-toggle {
      width: 100%; padding: 8px 14px; background: none; border: none;
      border-top: 1px solid var(--border); color: var(--dim);
      font-size: 11px; font-family: inherit; cursor: pointer;
      text-align: left; display: flex; align-items: center; gap: 6px;
      transition: color .15s;
    }
    .settings-toggle:hover { color: var(--text); }
    .settings-panel { display: none; padding: 12px 14px; border-top: 1px solid var(--border); background: var(--surface); }
    .settings-panel.open { display: block; }
    .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .settings-label { font-size: 11px; color: var(--dim); flex-shrink: 0; min-width: 80px; }
    .settings-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 9px;
      font-size: 11px; font-family: monospace; color: var(--text);
    }
    .settings-input:focus { outline: none; border-color: var(--purple); }
    .btn-save {
      padding: 6px 14px; border-radius: 7px; border: none;
      background: var(--purple); color: white; font-size: 11px;
      font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-save:hover { opacity: .85; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <img src="icons/icon128.png" alt="Bibi"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="logo-fallback">✦</span>
      </div>
      <span class="header-name">Bibi</span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="btn-theme" title="Alternar tema">🌙</button>
    </div>
  </div>

  <!-- Group bar -->
  <div class="group-bar">
    <div class="group-tabs">
      <span class="group-label">Abas:</span>
      <div id="group-tabs-info" style="display:flex;gap:4px;align-items:center;overflow:hidden;flex:1">
        <span style="color:var(--dim);font-size:10px">Nenhuma aba no grupo</span>
      </div>
    </div>
    <button class="btn-group" id="btn-group">+ Grupo</button>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea class="chat-input" id="chat-input"
        placeholder="Como posso ajudar?" rows="1"></textarea>
      <div class="input-toolbar">
        <button class="btn-send" id="btn-send">↑</button>
      </div>
    </div>
  </div>

  <button class="settings-toggle" id="settings-toggle">⚙ Configurações</button>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-row">
      <span class="settings-label">Chave API</span>
      <input class="settings-input" id="cfg-key" type="password" placeholder="AIzaSy...">
      <button class="btn-save" id="btn-save-key">Salvar</button>
    </div>
    <div style="font-size:10px;color:var(--dim)">
      Obtenha sua chave em aistudio.google.com/app/apikey
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
