<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bibi</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:       #1A1333;
      --surface:  #241848;
      --surface2: #2e1f5a;
      --border:   #3d2a7a;
      --text:     #f1e9ff;
      --dim:      #9b8cbf;
      --purple:   #A855F7;
      --purple2:  #c084fc;
      --pink:     #F472B6;
      --green:    #34d399;
      --yellow:   #fbbf24;
      --red:      #f87171;
      --send:     #A855F7;
      --user-bg:  rgba(168,85,247,.15);
      --user-br:  rgba(168,85,247,.35);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: background .2s, color .2s;
    }

    .btn-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--purple); }


    /* ── CHAT ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      background: var(--bg);
    }

    /* ── MENSAGENS ── */
    .msg { display: flex; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg-avatar img {
      width: 30px; height: 30px;
      max-width: 30px; max-height: 30px;
      object-fit: cover; display: block;
    }
    .msg.user .msg-avatar { font-size: 12px; }

    .msg-bubble {
      max-width: calc(100% - 44px);
      padding: 9px 13px;
      border-radius: 16px 16px 16px 4px;
      font-size: 13px; line-height: 1.6;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text); white-space: pre-wrap;
      box-shadow: 0 1px 4px rgba(109,40,217,.06);
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-color: var(--user-br);
      border-radius: 16px 16px 4px 16px;
    }
    .msg-bubble.thinking {
      color: var(--dim);
      display: flex; align-items: center; gap: 8px;
    }
    .dots span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--purple2); border-radius: 50%;
      animation: dot .9s ease-in-out infinite;
    }
    .dots span:nth-child(2){ animation-delay: .18s }
    .dots span:nth-child(3){ animation-delay: .36s }
    @keyframes dot {
      0%,80%,100%{ transform:translateY(0);opacity:.3 }
      40%{ transform:translateY(-5px);opacity:1 }
    }

    /* ── PLAN CARD ── */
    .plan-card {
      max-width: calc(100% - 44px);
      border: 1.5px solid rgba(109,40,217,.2);
      border-radius: 14px; padding: 12px;
      background: var(--surface);
      box-shadow: 0 2px 10px rgba(109,40,217,.08);
    }
    .plan-title {
      font-size: 12px; font-weight: 700;
      color: var(--purple); margin-bottom: 9px;
    }
    .plan-steps {
      display: flex; flex-direction: column;
      gap: 4px; margin-bottom: 11px;
    }
    .plan-step {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 12px; color: var(--dim);
      padding: 6px 9px; border-radius: 8px;
      background: var(--bg);
      border-left: 2px solid var(--border);
      transition: all .2s;
    }
    .step-num {
      width: 17px; height: 17px; border-radius: 5px;
      background: rgba(109,40,217,.1); color: var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .plan-step.running { border-left-color: var(--pink); color: var(--text); }
    .plan-step.running .step-num { background: rgba(244,114,182,.12); color: var(--pink); animation: blink .65s infinite; }
    .plan-step.done    { border-left-color: var(--green); }
    .plan-step.done    .step-num { background: rgba(5,150,105,.1); color: var(--green); }
    .plan-step.error   { border-left-color: var(--red); }
    .plan-step.error   .step-num { background: rgba(220,38,38,.1); color: var(--red); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }

    .plan-actions { display: flex; gap: 7px; }
    .btn-confirm {
      flex: 1; padding: 8px; border-radius: 10px; border: none;
      background: var(--send); color: #fff;
      font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 2px 10px rgba(109,40,217,.35); transition: all .15s;
    }
    .btn-confirm:hover { opacity: .88; transform: translateY(-1px); }
    .btn-deny {
      padding: 8px 12px; border-radius: 10px;
      background: transparent; color: var(--red);
      border: 1.5px solid rgba(220,38,38,.25);
      font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all .15s;
    }
    .btn-deny:hover { background: rgba(220,38,38,.06); }

    /* ── STATUS ── */
    .msg-inline {
      font-size: 10px; font-weight: 500; color: var(--dim);
      padding: 4px 12px; border-radius: 20px; align-self: center;
      background: var(--surface); border: 1px solid var(--border);
    }
    .msg-inline.ok   { color:var(--green); border-color:rgba(5,150,105,.3);   background:rgba(5,150,105,.06); }
    .msg-inline.err  { color:var(--red);   border-color:rgba(220,38,38,.3);   background:rgba(220,38,38,.06); }
    .msg-inline.info { color:var(--purple);border-color:rgba(109,40,217,.25); background:rgba(109,40,217,.06); }

    .msg-img { max-width:100%; border-radius:10px; margin-top:6px; display:block; }

    /* ── INPUT ── */
    .input-area {
      border-top: 1.5px solid var(--border);
      padding: 9px 12px 11px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 9px 12px 8px;
      transition: border-color .18s, box-shadow .18s;
    }
    .input-box:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(109,40,217,.1);
    }
    .chat-input {
      width: 100%; background: transparent;
      border: none; outline: none;
      font-size: 13px; font-family: inherit;
      color: var(--text); resize: none;
      min-height: 22px; max-height: 100px;
      line-height: 1.5; overflow-y: auto;
    }
    .chat-input::placeholder { color: var(--dim); }
    .input-toolbar {
      display: flex; align-items: center;
      justify-content: flex-end; margin-top: 7px;
    }
    .btn-send {
      width: 33px; height: 33px; border-radius: 50%; border: none;
      background: var(--send); color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(109,40,217,.4); transition: all .15s;
    }
    .btn-send:hover:not(:disabled) { opacity:.85; transform:translateY(-1px) scale(1.05); }
    .btn-send:disabled { opacity:.25; cursor:not-allowed; transform:none; box-shadow:none; }

    /* ── SETTINGS ── */
    .settings-panel {
      display: none; padding: 11px 14px;
      border-top: 1.5px solid var(--border);
      background: var(--surface);
    }
    .settings-panel.open { display: block; }
    .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .settings-label {
      font-size: 10px; font-weight: 700; color: var(--dim);
      flex-shrink: 0; min-width: 65px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .settings-input {
      flex: 1; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 9px; font-size: 11px;
      font-family: monospace; color: var(--text);
    }
    .settings-input:focus { outline: none; border-color: var(--purple); }
    .btn-save {
      padding: 6px 13px; border-radius: 8px; border: none;
      background: var(--purple); color: #fff;
      font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-save:hover { opacity: .85; }
    .settings-hint { font-size: 10px; color: var(--dim); line-height: 1.5; }
    .settings-hint b { color: var(--purple); font-weight: 700; }

    /* ── AÇÕES ── */
    .macros-bar {
      border-top: 1px solid var(--border);
      padding: 6px 8px 8px;
      background: transparent;
      flex-shrink: 0;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transition: max-height .22s ease, opacity .18s ease;
    }
    .macros-bar.visible {
      max-height: 200px;
      opacity: 1;
      pointer-events: all;
    }
    .macros-title {
      font-size: 9px; font-weight: 600;
      color: var(--dim); letter-spacing: .06em;
      margin-bottom: 5px; padding: 0 1px;
    }
    .macros-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .macros-extra {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-top: 4px;
    }
    .macros-extra.open { display: grid; }
    .macro-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 7px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.04); cursor: pointer;
      text-align: left; font-family: inherit;
      transition: all .15s; min-width: 0;
    }
    .macro-btn:hover {
      border-color: rgba(109,40,217,.35);
      background: rgba(109,40,217,.1);
    }
    .macro-btn.more {
      border-style: dashed;
      border-color: rgba(255,255,255,.1);
      background: transparent;
    }
    .macro-icon {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .macro-info { min-width: 0; flex: 1; }
    .macro-label {
      font-size: 10px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .macro-desc {
      font-size: 9px; color: var(--dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── TABS ── */
    .tab-nav {
      display: flex; flex-shrink: 0;
      border-bottom: 1.5px solid var(--border);
      background: var(--bg);
    }
    .tab-btn {
      flex: 1; padding: 8px 4px; background: transparent; border: none;
      font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--dim); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1.5px;
      transition: all .15s;
    }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-nav .btn-icon { margin: 4px 6px; flex-shrink: 0; }

    #view-chat { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #view-macros {
      display: none; flex-direction: column; flex: 1; overflow: hidden;
    }

    /* ── MACROS VIEW ── */
    .mv-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 13px 8px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .mv-title { font-size: 12px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
    .btn-add-macro {
      padding: 5px 12px; border-radius: 8px; border: none;
      background: var(--purple); color: #fff;
      font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-add-macro:hover { opacity: .85; }
    .mv-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .mv-empty {
      text-align: center; padding: 40px 16px;
      color: var(--dim); font-size: 12px; line-height: 1.8;
    }
    .mv-empty b { color: var(--purple); }
    .mitem {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer;
      transition: border-color .15s;
    }
    .mitem:hover { border-color: var(--purple); }
    .mitem-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .mitem-info { flex: 1; min-width: 0; }
    .mitem-shortcut { font-size: 10px; font-weight: 700; color: var(--purple); margin-bottom: 1px; }
    .mitem-lbl { font-size: 12px; font-weight: 600; color: var(--text); }
    .mitem-preview { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mitem-del {
      width: 26px; height: 26px; border: none; background: transparent;
      color: var(--dim); font-size: 14px; cursor: pointer; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
    }
    .mitem-del:hover { background: rgba(220,38,38,.1); color: var(--red); }
    .mv-hint {
      font-size: 10px; color: var(--dim); text-align: center;
      padding: 8px 12px 10px; border-top: 1px solid var(--border); flex-shrink: 0; line-height: 1.6;
    }
    .mv-hint b { color: var(--purple); }

    /* ── MACRO EDITOR MODAL ── */
    .mfield-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .mfield { display: flex; flex-direction: column; gap: 4px; }
    .mfield.grow { flex: 1; min-width: 0; }
    .mfield-label {
      font-size: 10px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .mfield-icon-btn {
      width: 46px; height: 36px; border-radius: 9px; border: 1.5px solid var(--border);
      background: var(--surface); font-size: 20px; cursor: pointer; transition: border-color .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .mfield-icon-btn:hover { border-color: var(--purple); }
    .mfield input, .mfield textarea {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 7px 10px; font-size: 12px; font-family: inherit;
      color: var(--text); outline: none; resize: none; transition: border-color .15s;
    }
    .mfield input:focus, .mfield textarea:focus { border-color: var(--purple); }
    .mfield input::placeholder, .mfield textarea::placeholder { color: var(--dim); }
    .macro-ai-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding: 9px 11px;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer;
    }
    .macro-ai-row input[type="checkbox"] { accent-color: var(--purple); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .macro-ai-row span { font-size: 12px; color: var(--text); }

    /* ── MODAL REATIVAR ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: flex-end;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; background: var(--bg);
      border-radius: 16px 16px 0 0;
      padding: 14px 14px 20px;
      border-top: 1.5px solid var(--border);
      transform: translateY(100%);
      transition: transform .25s ease;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 32px; height: 3px; background: var(--border);
      border-radius: 2px; margin: 0 auto 14px;
    }
    .modal-title {
      font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 12px;
    }
    .modal-label {
      font-size: 10px; font-weight: 600; color: var(--dim);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px;
    }
    .modal-textarea {
      width: 100%; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 10px; font-size: 12px; font-family: inherit;
      color: var(--text); resize: none; outline: none;
      margin-bottom: 10px; line-height: 1.5;
    }
    .modal-textarea:focus { border-color: var(--purple); }
    .modal-counter { font-size: 10px; color: var(--dim); margin: -6px 0 10px 2px; }
    .modal-footer { display: flex; gap: 8px; }
    .btn-modal-cancel {
      flex: 1; padding: 9px; border-radius: 10px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--dim); font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .btn-modal-send {
      flex: 2; padding: 9px; border-radius: 10px; border: none;
      background: var(--send); color: #fff;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; box-shadow: 0 2px 8px rgba(109,40,217,.35);
      transition: all .15s;
    }
    .btn-modal-send:hover { opacity: .88; }
    .btn-modal-send:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
  </style>
</head>
<body>

  <!-- Tabs nav -->
  <div class="tab-nav">
    <button class="tab-btn active" data-view="chat">Chat</button>
    <button class="tab-btn" data-view="macros">Atalhos</button>
    <button class="btn-icon" id="settings-toggle" title="Configurações">⚙</button>
  </div>

  <!-- ── VIEW CHAT ── -->
  <div id="view-chat">

  <!-- Chat -->
  <div class="chat" id="chat"></div>

  <!-- Ações rápidas -->
  <div class="macros-bar">
    <div class="macros-title">Ações do chat</div>
    <div class="macros-grid" id="macros-list"></div>
    <div class="macros-extra" id="macros-extra"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea class="chat-input" id="chat-input"
        placeholder="Como posso ajudar?" rows="1"></textarea>
      <div class="input-toolbar">
        <button class="btn-send" id="btn-send">↑</button>
      </div>
    </div>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-row">
      <span class="settings-label">Chave API</span>
      <input class="settings-input" id="cfg-key" type="password" placeholder="gsk_...">
      <button class="btn-save" id="btn-save-key">Salvar</button>
    </div>
    <div class="settings-hint">
      Chave grátis em <b>console.groq.com</b> → API Keys → Create
    </div>
  </div>

  </div><!-- /view-chat -->

  <!-- ── VIEW MACROS ── -->
  <div id="view-macros">
    <div class="mv-header">
      <span class="mv-title">Seus atalhos de texto</span>
      <button class="btn-add-macro" id="btn-add-macro">+ Novo</button>
    </div>
    <div class="mv-list" id="macro-list"></div>
    <div class="mv-hint">
      Digite <b>/atalho</b> em qualquer campo de texto para expandir automaticamente.
    </div>
  </div>

  <!-- Modal Reativar Leads -->
  <div class="modal-overlay" id="modal-reativar">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">📲 Reativar leads</div>
      <div class="modal-label">Números (um por linha)</div>
      <textarea class="modal-textarea" id="modal-numbers" rows="4"
        placeholder="11999999999&#10;11888888888&#10;11777777777"></textarea>
      <div class="modal-counter" id="modal-counter">0 números</div>
      <div class="modal-label">Mensagem</div>
      <textarea class="modal-textarea" id="modal-message" rows="3"
        placeholder="Oi! Tudo bem? Passando para retomar nosso contato..."></textarea>
      <div class="modal-footer">
        <button class="btn-modal-cancel" id="btn-modal-cancel">Cancelar</button>
        <button class="btn-modal-send" id="btn-modal-send">Enviar para todos</button>
      </div>
    </div>
  </div>

  <!-- Modal Macro Editor -->
  <div class="modal-overlay" id="modal-macro">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="macro-modal-title">Novo atalho</div>

      <div class="mfield-row">
        <div class="mfield">
          <div class="mfield-label">Ícone</div>
          <button class="mfield-icon-btn" id="macro-icon-btn">⚡</button>
        </div>
        <div class="mfield grow">
          <div class="mfield-label">Atalho (sem /)</div>
          <input id="macro-shortcut" type="text" placeholder="ex: oi, followup, proposta" autocomplete="off">
        </div>
      </div>

      <div class="mfield" style="margin-bottom:12px">
        <div class="mfield-label">Nome do atalho</div>
        <input id="macro-label-inp" type="text" placeholder="ex: Saudação inicial">
      </div>

      <div class="mfield" style="margin-bottom:12px">
        <div class="mfield-label">Conteúdo</div>
        <textarea id="macro-content" rows="4"
          placeholder="Olá {{nome}}, tudo bem?&#10;&#10;Use {{variavel}} para campos interativos."></textarea>
      </div>

      <label class="macro-ai-row">
        <input type="checkbox" id="macro-ai">
